---
name: Lint Charts

on:
  pull_request:
    paths:
    - "charts/**"
    - ".devcontainer/Dockerfile"
    - ".github/workflows/lint.yaml"
    - "justfile"
    - ".yamlfmt"
    - ".pre-commit-config.yaml"
  push:
    branches:
    - main
    paths:
    - "charts/**"
    - ".devcontainer/Dockerfile"
    - ".github/workflows/lint.yaml"
    - "justfile"
    - ".yamlfmt"
    - ".pre-commit-config.yaml"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    # https://github.com/actions/checkout
    - name: Checkout
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      with:
        fetch-depth: 0

    # https://github.com/docker/setup-buildx-action
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

    # https://github.com/docker/build-push-action
    - name: Build lint image
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        context: .devcontainer
        target: base
        # load into the local Docker daemon so it can be used by `docker run`
        load: true
        tags: cluster-api-cluster-charts-lint:ci
        cache-from: type=gha,scope=lint
        cache-to: type=gha,scope=lint,mode=max

    - name: Lint charts
      run: |
        docker run --rm \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -w /workspace \
          cluster-api-cluster-charts-lint:ci \
          just _lint
